<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyiha - Raqamli Nazorat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="project-page">
    <header class="header container">
        <div class="header__container">
            <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">
                <img src="./Assets/Navbar_logo.svg" alt="">
                <span class="logo__text">Raqamli Nazorat</span>
            </div>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html#loyihalar" class="nav__link" data-i18n="nav_projects">Loyihalar</a></li>
                    <li><a href="index.html#biz-haqimizda" class="nav__link" data-i18n="nav_about">Biz haqimizda</a>
                    </li>
                </ul>
            </nav>

            <div class="header__actions">
                <button class="theme-toggle" id="theme-toggle">
                    <i data-lucide="sun" class="theme-icon-sun"></i>
                    <i data-lucide="moon" class="theme-icon-moon"></i>
                </button>
                <div class="lang-switcher">
                    <div class="lang-switcher__current" id="lang-current">
                        <img src="./Assets/uzbekistan.svg" alt="UZ">
                        <span>UZ</span>
                        <img src="./Assets/arrow-up-01-sharp.svg" style="width: 25px; height: 25px;" alt="">
                    </div>
                    <div class="lang-switcher__dropdown" id="lang-dropdown">
                        <div class="lang-switcher__option" data-lang="uz">
                            <img src="./Assets/UZB.svg" alt="UZ">
                            <span>O'zbekcha</span>
                        </div>
                        <div class="lang-switcher__option" data-lang="en">
                            <img src="./Assets/ENG.svg" alt="EN">
                            <span>English</span>
                        </div>
                        <div class="lang-switcher__option" data-lang="ru">
                            <img src="./Assets/RUS.svg" alt="RU">
                            <span>Русский</span>
                        </div>
                    </div>
                </div>
                <a href="#aloqa" class="btn btn--aloqa">
                    <span data-i18n="btn_contact">Aloqa</span>
                    <i data-lucide="phone"></i>
                </a>
                <a href="https://boshqaruv.raqamlinazorat.uz" target="_blank" class="btn btn--project">
                    <span data-i18n="btn_new_project">Yangi loyiha</span>
                    <i data-lucide="mouse-pointer-2"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="project-detail-container container">
        <div class="breadcrumbs" style="margin-top: -50px; font-size: 15px;">
            <span data-i18n="nav_home" onclick="location.href='index.html'" style="cursor: pointer;color: var(--text-muted);">Asosiy</span> /
            <span data-i18n="nav_projects" style="color: var(--text-title); cursor: pointer;" onclick="location.href='index.html#loyihalar'">Loyihalar</span>
        </div>
        <div id="project-content">
            <!-- Dynamic sections -->
        </div>
    </main>

    <footer class="footer">
        <div class="footer__content">
            <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">
                <img id="footer-img" src="./Images/Footer_logo.png" alt="">
                <span class="logo__text">Raqamli Nazorat</span>
            </div>
            <div class="footer__actions">
                <button class="btn btn--number" id="aloqa">
                    <i data-lucide="phone" style="width: 16px; height: 16px;"></i>
                    <span style="font-size: 15px; font-weight: 600;">+998 91 601 43 33</span>
                </button>
            </div>
        </div>
    </footer>

    <script type="module" src="project-script.js"></script>
</body>

</html>
